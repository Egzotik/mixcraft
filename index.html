<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MixCraft — Mix Industrial</title>
  <link rel="icon" href="https://minecraft.mix-servers.com/assets/main/img/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0b0f;
      --card-bg: #1a1c22;
      --accent-orange: #ffb800;
      --border: rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 15px;
      position: relative;
      user-select: none;
    }

    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 35px 25px 40px;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      position: relative;
      z-index: 2;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .main-title h1 {
      font-size: clamp(38px, 9vw, 68px);
      font-weight: 900;
      color: var(--accent-orange);
      letter-spacing: -2px;
      text-shadow: 0 0 30px #ffb800, 0 0 60px #ffb800;
      animation: glowPulse 4s ease-in-out infinite;
      margin: 0;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 30px #ffb800, 0 0 60px #ffb800; }
      50% { text-shadow: 0 0 45px #ffb800, 0 0 85px #ffb800; }
    }

    .back-btn {
      background: linear-gradient(135deg, #5865f2, #4752c4);
      color: white;
      padding: 12px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-size: 15px;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
    }

    .content {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .grid-container, .selection-container {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--border);
      flex: 1;
      min-width: 340px;
    }

    #search-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid #333;
      background: #111318;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    #search-input:focus {
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 4px rgba(255,184,0,0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 12px;
      justify-content: center;
    }

    .grid-item {
      width: 64px; height: 64px;
      background: #111318;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .grid-item:hover {
      transform: scale(1.08);
      border-color: var(--accent-orange);
    }

    .grid-item img { max-width: 46px; max-height: 46px; }

    .qty-badge {
      position: absolute;
      bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
      font-weight: 600;
    }

    .selected-item {
      background: rgba(0,0,0,0.4);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
    }

    .selected-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .selected-item-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-grow: 1;
    }

    .selected-item img {
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #444;
    }

    .selected-item input {
      width: 60px;
      background: #111318;
      border: 1px solid #444;
      color: #fff;
      padding: 6px;
      text-align: center;
      border-radius: 8px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #ed4245;
      font-size: 22px;
      cursor: pointer;
    }

    #selected-list, #result {
      max-height: 380px;
      overflow-y: auto;
      padding-right: 6px;
    }

    #result {
      background: rgba(0,0,0,0.4);
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-top: 15px;
    }

    #result::-webkit-scrollbar, #selected-list::-webkit-scrollbar {
      width: 6px;
    }
    #result::-webkit-scrollbar-thumb, #selected-list::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 10px;
    }

    .clear-btn {
      background: linear-gradient(135deg, #ed4245, #c72c2f);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      margin: 12px auto 0;
      display: block;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-content {
      background: #1a1c22;
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .craft-grid {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 8px;
      justify-content: center;
      margin: 20px 0;
    }

    .craft-cell {
      background: #111318;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .craft-cell img { max-width: 42px; max-height: 42px; }

    @media (max-width: 900px) {
      .card { padding: 25px 18px 35px; }
      .header { justify-content: center; }
      .content { gap: 20px; }
      .grid-container, .selection-container { min-width: 100%; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 10px; }
      .grid-item { width: 58px; height: 58px; }
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .main-title h1 { font-size: 48px; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="card">
    <div class="header">
      <div class="main-title">
        <h1>MixCraft</h1>
      </div>
      <a href="https://egzotik.github.io/mixmonitoring/" class="back-btn">
        ← Назад к мониторингу
      </a>
    </div>

    <div class="content">
      <div class="grid-container">
        <div id="search-container">
          <input type="text" id="search-input" placeholder="Поиск предметов..." autocomplete="off">
        </div>
        <div class="grid" id="item-grid"></div>
      </div>

      <div class="selection-container">
        <div id="selected-list"></div>
        <button id="clear-selection" class="clear-btn">🗑 Очистить всё</button>
        <div id="result">Выберите предметы для расчёта ресурсов</div>
      </div>
    </div>
  </div>

  <!-- Модальное окно -->
  <div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modal-img" style="width:80px;height:80px;border-radius:12px;margin-bottom:16px;" src="" alt="">
      <h2 id="modal-name" style="color:#ffb800; margin-bottom:20px;"></h2>
      <div id="modal-craft" class="craft-grid"></div>
      <button onclick="closeModal()" style="margin-top:24px; padding:12px 32px; background:#ed4245; color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer;">
        Закрыть
      </button>
    </div>
  </div>

  <script src="craft.js"></script>
  <script>
    // ==================== Частицы ====================
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 4 + 2;
        this.speed = Math.random() * 2.5 + 1.2;
        this.opacity = Math.random() * 0.6 + 0.3;
        this.color = ['#ffb800', '#ffdd88', '#ffffff', '#a0d8ff'][Math.floor(Math.random()*4)];
      }
      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 220) {
          this.x += dx * 0.018;
          this.y += dy * 0.018;
        }
        this.y -= this.speed;
        this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -50) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 90; i++) particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    // ==================== Логика калькулятора ====================
    const selectedItems = [];
    const searchInput = document.getElementById('search-input');
    const itemGrid = document.getElementById('item-grid');
    const selectedList = document.getElementById('selected-list');
    const resultDiv = document.getElementById('result');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalName = document.getElementById('modal-name');
    const modalCraft = document.getElementById('modal-craft');

    const BASE_RESOURCES = ['30188', '30244', '30831:11', '4362:6', '406'];

    function addToSelection(id) {
      const existing = selectedItems.find(item => item.id === id);
      if (existing) existing.count++;
      else selectedItems.push({ id, count: 1 });
      renderSelectedList();
      calculateResources();
    }

    function renderItemGrid() {
      itemGrid.innerHTML = '';
      const searchValue = searchInput.value.toLowerCase();

      const filtered = crafts
        .filter(c => !c.hidden)
        .filter(c => c.name.toLowerCase().includes(searchValue) || c.id.toLowerCase().includes(searchValue));

      filtered.forEach(craft => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.title = craft.name;

        const img = document.createElement('img');
        img.src = craft.img || 'https://via.placeholder.com/48';
        div.appendChild(img);

        if (craft.outputQuantity && craft.outputQuantity > 1) {
          const badge = document.createElement('div');
          badge.className = 'qty-badge';
          badge.textContent = craft.outputQuantity;
          div.appendChild(badge);
        }

        div.onclick = () => addToSelection(craft.id);
        itemGrid.appendChild(div);
      });
    }

    function renderSelectedList() {
      selectedList.innerHTML = '';
      if (selectedItems.length === 0) {
        selectedList.innerHTML = `<p style="text-align:center; color:#888; padding:40px 0;">Выберите предметы слева</p>`;
        return;
      }

      selectedItems.forEach(({id, count}, index) => {
        const craft = crafts.find(c => c.id === id);
        if (!craft) return;

        const div = document.createElement('div');
        div.className = 'selected-item';
        div.innerHTML = `
          <div class="selected-item-header">
            <div class="selected-item-info">
              <img src="${craft.img}" onclick="showCraftModal('${id}')" title="Рецепт">
              <span>${craft.name}</span>
            </div>
            <input type="number" value="${count}" min="1" onchange="updateCount(${index}, this.value)">
            <button class="remove-btn" onclick="removeItem(${index})">×</button>
          </div>
        `;
        selectedList.appendChild(div);
      });
    }

    window.updateCount = (index, val) => {
      let num = parseInt(val);
      if (isNaN(num) || num < 1) num = 1;
      selectedItems[index].count = num;
      renderSelectedList();
      calculateResources();
    };

    window.removeItem = (index) => {
      selectedItems.splice(index, 1);
      renderSelectedList();
      calculateResources();
    };

    function getComponentsFromRecipe(recipe) {
      const components = {};
      for (const row of recipe) {
        for (const id of row) {
          if (!id) continue;
          components[id] = (components[id] || 0) + 1;
        }
      }
      return Object.entries(components).map(([id, count]) => ({ id, count }));
    }

    function calculateResources() {
      if (selectedItems.length === 0) {
        resultDiv.innerHTML = '<p style="color:#888;text-align:center;">Выберите предметы для расчёта ресурсов</p>';
        return;
      }

      resultDiv.innerHTML = '';
      const resourcesCount = {};
      const baseResources = {};

      function accumulate(craft, quantity, isRoot = false) {
        const output = craft.outputQuantity || 1;
        const craftCount = Math.ceil(quantity / output);
        const components = getComponentsFromRecipe(craft.recipe || []);

        components.forEach(component => {
          if (BASE_RESOURCES.includes(component.id)) {
            baseResources[component.id] = (baseResources[component.id] || 0) + component.count * craftCount;
          } else {
            const subCraft = crafts.find(c => c.id === component.id);
            if (subCraft) {
              accumulate(subCraft, component.count * craftCount);
            } else {
              resourcesCount[component.id] = (resourcesCount[component.id] || 0) + component.count * craftCount;
            }
          }
        });

        if (!isRoot) resourcesCount[craft.id] = (resourcesCount[craft.id] || 0) + quantity;
      }

      selectedItems.forEach(({id, count}) => {
        const craft = crafts.find(c => c.id === id);
        if (craft) accumulate(craft, count, true);
      });

      let html = `<p style="color:#ffb800; font-weight:600; margin-bottom:12px;">Для крафта нужно:</p>`;

      if (Object.keys(baseResources).length > 0) {
        html += `<p style="color:#ddd; margin:8px 0 6px 0;">Базовые ресурсы:</p><ul style="list-style:none; padding:0;">`;
        Object.entries(baseResources).forEach(([id, qty]) => {
          const item = crafts.find(c => c.id === id);
          if (item) html += `<li style="display:flex;align-items:center;gap:10px;margin:6px 0;"><img src="${item.img}" width="24" height="24" style="border-radius:4px;"> <span>${item.name} × <b>${qty}</b></span></li>`;
        });
        html += `</ul>`;
      }

      html += `<p style="color:#ddd; margin:12px 0 6px 0;">Необходимые ресурсы:</p><ul style="list-style:none; padding:0;">`;
      Object.entries(resourcesCount).forEach(([id, qty]) => {
        const item = crafts.find(c => c.id === id);
        if (item) html += `<li style="display:flex;align-items:center;gap:10px;margin:6px 0;"><img src="${item.img}" width="24" height="24" style="border-radius:4px;"> <span>${item.name} × <b>${qty}</b></span></li>`;
      });
      html += `</ul>`;

      resultDiv.innerHTML = html;
    }

    window.showCraftModal = (id) => {
      const craft = crafts.find(c => c.id === id);
      if (!craft || !craft.recipe) return;

      modalImg.src = craft.img;
      modalName.textContent = craft.name;
      modalCraft.innerHTML = '';

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const cell = document.createElement('div');
          cell.className = 'craft-cell';
          const itemId = craft.recipe[r][c];
          if (itemId) {
            const item = crafts.find(x => x.id === itemId);
            if (item) {
              const img = document.createElement('img');
              img.src = item.img;
              img.style.cursor = 'pointer';
              img.onclick = () => showCraftModal(itemId);
              cell.appendChild(img);
            }
          }
          modalCraft.appendChild(cell);
        }
      }
      modal.style.display = 'flex';
    };

    window.closeModal = () => modal.style.display = 'none';

    // Инициализация
    document.getElementById('clear-selection').addEventListener('click', () => {
      selectedItems.length = 0;
      renderSelectedList();
      calculateResources();
    });

    searchInput.addEventListener('input', renderItemGrid);

    window.addEventListener('resize', resize);
    resize();
    initParticles();
    animate();
    renderItemGrid();
    renderSelectedList();
    calculateResources();
  </script>
</body>
</html>
